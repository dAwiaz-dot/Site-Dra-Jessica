<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex, nofollow">
<title>Dra. Jessica Daniela</title>

<style>
:root {
  --black: #080808;
  --black2: #101010;
  --black3: #171717;
  --gold: #C9A655;
  --gold-light: #E4C477;
  --gold-dim: rgba(201, 166, 85, .14);
  --gold-border: rgba(201, 166, 85, .3);
  --white: #fff;
  --muted: #A2A2A2;
  --green: #25D366;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100svh;
  font-family: "Jost", sans-serif;
  background: radial-gradient(circle at 50% 0%, rgba(201,166,85,.10), transparent 55%), var(--black);
  color: var(--white);
  display: flex;
  justify-content: center;
  padding: 4rem 1.2rem 3rem;
}

.wrap { width: 100%; max-width: 400px; }

.profile { text-align: center; margin-bottom: 2rem; }

.avatar {
  width: 72px;
  height: 72px;
  margin: 0 auto .9rem;
  border-radius: 50%;
  overflow: hidden;
  border: 1px solid var(--gold-border);
  box-shadow: 0 0 0 5px rgba(201,166,85,.06);
}

.avatar img { width: 100%; height: 100%; object-fit: cover; }

.profile small {
  display: block;
  color: var(--gold);
  font-size: .64rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: .35rem;
}

.profile h1 {
  font-family: "Cormorant Garamond", serif;
  font-weight: 600;
  font-size: 1.5rem;
  margin: 0;
}

.links { display: flex; flex-direction: column; gap: 1.1rem; }

.link-card {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 128px;
  padding: 1.5rem 1.4rem;
  background: var(--black2);
  border: 1px solid var(--gold-border);
  border-radius: 22px;
  text-decoration: none;
  color: var(--white);
  overflow: hidden;
  transition: transform .18s, border-color .18s;
}

.link-card:active { transform: scale(.98); }
.link-card:hover { border-color: var(--gold); }

.link-copy { position: relative; z-index: 1; max-width: 62%; }

.link-copy strong {
  display: block;
  font-family: "Cormorant Garamond", serif;
  font-weight: 600;
  font-size: 1.35rem;
  line-height: 1.15;
  margin-bottom: .5rem;
}

.link-copy span {
  display: block;
  color: var(--muted);
  font-size: .8rem;
  font-weight: 300;
  line-height: 1.5;
}

.link-photo {
  position: relative;
  z-index: 1;
  flex: none;
  width: 92px;
  height: 92px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--gold-border);
}

.link-photo img { width: 100%; height: 100%; object-fit: cover; }

.link-mark {
  position: relative;
  z-index: 1;
  flex: none;
  width: 92px;
  height: 92px;
  border-radius: 16px;
  display: grid;
  place-items: center;
  border: 1px solid var(--gold-border);
  background: rgba(255,255,255,.03);
}

.link-mark svg { width: 34px; height: 34px; }

/* WhatsApp card */
.link-card.whatsapp {
  background: linear-gradient(135deg, rgba(37,211,102,.1), var(--black2) 60%);
  border-color: rgba(37,211,102,.32);
}
.link-card.whatsapp .link-mark { background: #25D366; border-color: #25D366; color: #fff; }
.link-card.whatsapp .link-mark svg { width: 36px; height: 36px; }
.link-card.whatsapp:hover { border-color: var(--green); }

/* Mentoria card - featured */
.link-card.featured {
  background: linear-gradient(135deg, rgba(201,166,85,.22), var(--black3) 65%);
  border-color: var(--gold);
}
.link-card.featured .link-copy strong { color: var(--gold-light); }

/* Site card */
.link-card.site .link-photo { border-color: var(--gold-border); }

.foot {
  text-align: center;
  margin-top: 2.4rem;
  color: #555;
  font-size: .66rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}

@media (max-width: 360px) {
  .link-card { padding: 1.2rem; min-height: 112px; }
  .link-photo, .link-mark { width: 76px; height: 76px; }
  .link-copy strong { font-size: 1.15rem; }
}
</style>
</head>

  </div>

  <div class="foot">Clínica Dra Jessica Daniela</div>
